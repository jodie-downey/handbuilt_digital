<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>You're on my radar — HandBuilt Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Source Sans 3", sans-serif;
        background-color: #f7f5fb;
        color: #1a1025;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      .kicker {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #5b35b0;
        margin-bottom: 1.25rem;
      }

      h1 {
        font-family: "Lora", serif;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 600;
        line-height: 1.2;
        color: #1a1025;
        max-width: 540px;
      }

      .sub {
        margin-top: 1.25rem;
        font-size: 1.125rem;
        color: rgba(26, 16, 37, 0.65);
        line-height: 1.7;
        max-width: 440px;
      }

      .divider {
        width: 2rem;
        height: 2px;
        background-color: #c084fc;
        border-radius: 9999px;
        margin: 2rem auto;
      }

      .tagline {
        font-family: "Lora", serif;
        font-style: italic;
        font-size: 1rem;
        color: #5b35b0;
        margin-bottom: 2rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        font-weight: 600;
        color: #5b35b0;
        text-decoration: none;
        border: 1px solid #5b35b0;
        border-radius: 0.75rem;
        padding: 0.75rem 1.5rem;
        transition: background-color 0.2s ease;
      }

      a:hover {
        background-color: rgba(91, 53, 176, 0.08);
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        font-size: 0.75rem;
        color: rgba(26, 16, 37, 0.3);
      }
    </style>
  </head>
  <body>
    <p class="kicker">Message received</p>
    <h1>You're on my radar.</h1>
    <p class="sub">
      I'll reach out within 24 hours to schedule your discovery call —
      a real conversation, no pressure, no pitch deck.
    </p>
    <div class="divider"></div>
    <p class="tagline">"Crafted. Not generated."</p>
    <a href="/">Back to HandBuilt Digital</a>

    <footer>© HandBuilt Digital · Franklin, KY</footer>
  </body>
</html>
